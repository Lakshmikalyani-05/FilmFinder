<!DOCTYPE html>
<html>
<head>
    <title>Film Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎬 Film Finder</h1>
    <p>Your Personal Movie Discovery Assistant</p>
    <input type="text" id="searchInput" placeholder="Search Movies" onkeyup="searchMovies()">
    <div class="filters">
       
        <label>Language:</label>
        <select id="languageFilter" onchange="filterMovies()">
            <option value="All">All Languages</option>
            <option value="Telugu">Telugu</option>
            <option value="Hindi">Hindi</option>
            <option value="English">English</option>
            <option value="Tamil">Tamil</option>
            <option value="Malayalam">Malayalam</option>
            <option value="Kannada">Kannada</option>
        </select>
        <label>Category:</label>
        <select id="categoryFilter" onchange="filterMovies()">
            <option value="All">All Categories</option>
            <option value="Romance">Romance</option>
            <option value="Action">Action</option>
            <option value="SportsDrama">Sports Drama</option>
            <option value="ComedyDrama">Comedy/Drama</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Sci-Fi/Thriller">Sci-Fi/Thriller</option>
        </select>
    
    </div>
    <h2>Backend Movies</h2>
    <div id="backendMovieContainer" class="movies-container"></div>
    


    <div id="movieContainer" class="movies-container">
        
    </div>
    <p id="noMovies" style="display:none; color:red; font-size:20px;">
    ❌ No Movies Found
    </p>
    
<script src="script.js"></script>
</body>
</html>
